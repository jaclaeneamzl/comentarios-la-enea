<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro de Comentarios</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.contenedor{
    max-width:800px;
    margin:auto;
}

h1{
    text-align:center;
}

.caja{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
    border:1px solid #ddd;
    border-radius:5px;
    resize:none;
}

button{
    margin-top:10px;
    background:#0d6efd;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

.comentario{
    background:white;
    margin-top:10px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 1px 4px rgba(0,0,0,.1);
}
</style>
</head>

<body>

<div class="contenedor">

    <h1>Libro de Comentarios</h1>

    <div class="caja">
        <textarea id="comentario"
        placeholder="Escribe tu comentario aquí..."></textarea>

        <button onclick="publicar()">
            Publicar
        </button>
    </div>

    <div id="comentarios"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB49bAQ2B9DEWJOlshh9su-pqoEZTR91gQ",
  authDomain: "la-enea-1735b.firebaseapp.com",
  projectId: "la-enea-1735b",
  storageBucket: "la-enea-1735b.firebasestorage.app",
  messagingSenderId: "100870278827",
  appId: "1:100870278827:web:14bf24bf2606d1458331ee",
  measurementId: "G-NTQNLHYD7E"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.publicar = async function(){

    const texto =
    document.getElementById("comentario").value.trim();

    const palabrasProhibidas = [
        "idiota",
        "puta",
        "zorra",
        "bobo",
        "estupido"
    ];

    const textoMinusculas = texto.toLowerCase();

    const contienePalabraProhibida =
    palabrasProhibidas.some(
        palabra => textoMinusculas.includes(palabra)
    );

    if (contienePalabraProhibida) {
        alert("Tu comentario contiene palabras no permitidas.");
        return;
    }

    if(!texto) return;

    await addDoc(
        collection(db,"comentarios"),
        {
            texto,
            fecha: serverTimestamp()
        }
    );

    document.getElementById("comentario").value="";
};

const q = query(
    collection(db,"comentarios"),
    orderBy("fecha","desc")
);

onSnapshot(q,(snapshot)=>{

    let html="";

    snapshot.forEach((doc)=>{

        html += `
        <div class="comentario">
            ${doc.data().texto}
        </div>
        `;
    });

    document.getElementById("comentarios").innerHTML = html;

});

</script>

</body>
</html>
